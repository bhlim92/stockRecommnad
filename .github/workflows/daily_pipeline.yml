name: Daily Stock Analysis Pipeline

on:
  schedule:
    # 6:00 AM KST is 9:00 PM UTC (21:00 UTC) of the previous day
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Credentials File
        if: "${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON != '' }}"
        run: |
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON != '' && 'service_account.json' || '' }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # If Google Drive credentials are empty, run with --dry-run
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "Google Drive credentials not configured. Running in DRY-RUN mode."
            python main.py --dry-run
          else
            echo "Google Drive credentials configured. Running in Standard mode."
            python main.py
          fi
